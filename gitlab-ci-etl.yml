image: python:3.8

import_galaxy_metadata:
  stage: import
  script:
    - pip install --cache-dir .pip_cache/ -r requirements.txt
    - mkdir -p logs
    - python3 ./main.py -l DEBUG -d logs/summary.log
  artifacts:
    paths:
      - logs/summary.log
    expire_in: 4 weeks
  
  cache:
    paths:
      - .pip_cache/
    key: "${CI_COMMIT_REF_SLUG}"
