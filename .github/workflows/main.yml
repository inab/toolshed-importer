name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  tag_version:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.fetch_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Fetch version and create Git tag
        id: fetch_version
        shell: bash
        run: |
          VERSION=$(cat VERSION)

          echo "Validating version format for $VERSION..."

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: The version '$VERSION' does not follow Semantic Versioning (e.g. 1.0.0)."
            exit 1
          fi

          if [[ "$VERSION" != v* ]]; then
            VERSION="v$VERSION"
            echo "Prepending 'v'. New version is $VERSION"
          fi

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "ERROR: Version $VERSION already has a Git tag!"
            exit 1
          fi

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git tag "$VERSION"
          git push origin "$VERSION"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: [tag_version]
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/toolshed-importer:${{ needs.tag_version.outputs.version }} \
            -t ghcr.io/${{ github.repository_owner }}/toolshed-importer:latest \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/toolshed-importer:${{ needs.tag_version.outputs.version }}
          docker push ghcr.io/${{ github.repository_owner }}/toolshed-importer:latest