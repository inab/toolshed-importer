image: python:3.8-alpine

stages:
  - main_task
  - summarize
  - deploy

run_metadata_import:
  stage: main_task
  before_script:
    - apk add --no-cache bash # Ensure bash is available for date manipulation
  script:
    - pip install --cache-dir .pip_cache/ -r requirements.txt
    - echo "⚙️ Running main task"
    - START_TIME=$(date +%s)
    - python3 ./main.py -l DEBUG
    - END_TIME=$(date +%s)
    - DURATION=$((END_TIME-START_TIME))
    - |
      echo -e "\n\
      ✨ Execution finished\n\
      \n\"
  artifacts:
    expire_in: 4 weeks
  cache:
    paths:
      - .pip_cache/
    key: "${CI_COMMIT_REF_SLUG}"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'


build_and_push:
  image: docker:latest
  stage: deploy
  services:
    - docker:dind
  only:
    - tags
  script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    - docker build -t "$DOCKERHUB_USERNAME/toolshed_metadata_impoter:$CI_COMMIT_TAG" -f Dockerfile .
    - docker push "$DOCKERHUB_USERNAME/toolshed_metadata_impoter:$CI_COMMIT_TAG"
  after_script:
    - docker logout