image: python:3.8-alpine

stages:
  - main_task
  - summarize

run_metadata_import:
  stage: deploy
  before_script:
    - apk add --no-cache bash # Ensure bash is available for date manipulation
  script:
    - pip install --cache-dir .pip_cache/ -r requirements.txt
    - echo "Running main task and capturing logs"
    - START_TIME=$(date +%s)
    - python3 ./main.py -l DEBUG | tee main_task_logs.txt
    - ERRORS=$(grep -i "error" main_task_logs.txt | wc -l)
    - echo $ERRORS > error_count.txt
    - END_TIME=$(date +%s)
    - DURATION=$((END_TIME-START_TIME))
    - ERRORS=$(grep -c 'error' logs/output.log) # Count warnings in output.log
    - |
      echo -e "------------📊 **Execution Summary** 📊----------------------\n\
      🚀 Start Time: $(date -d @$START_TIME +"%Y-%m-%d %H:%M:%S")\n\
      🏁 End Time: $(date -d @$END_TIME +"%Y-%m-%d %H:%M:%S")\n\
      ⏱ Duration: $DURATION seconds\n\
      ❌ Number of Errors (Warnings): $ERRORS" | tee logs/summary.log"
  artifacts:
    paths:
      - main_task_logs.txt
      - error_count.txt
      - start_time.txt
      - end_time.txt
      - duration.txt
    expire_in: 4 weeks
  cache:
    paths:
      - .pip_cache/
    key: "${CI_COMMIT_REF_SLUG}"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'


build_and_push:
  image: docker:latest
  stage: deploy
  services:
    - docker:dind
  only:
    - tags
  script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    - docker build -t "$DOCKERHUB_USERNAME/toolshed_metadata_impoter:$CI_COMMIT_TAG" -f Dockerfile .
    - docker push "$DOCKERHUB_USERNAME/toolshed_metadata_impoter:$CI_COMMIT_TAG"
  after_script:
    - docker logout