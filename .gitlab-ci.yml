image: python:3.8-alpine

run_metadata_import:
  stage: deploy
  before_script:
    - apk add --no-cache bash # Ensure bash is available for date manipulation
  script:
    - pip install --cache-dir .pip_cache/ -r requirements.txt
    - mkdir -p logs
    - |
      echo "🕒 Start Time: $(date)"
    - START_TIME=$SECONDS
    - python3 ./main.py -l DEBUG -d logs/summary_$(date +%F).log > logs/output.log 2>&1
    - END_TIME=$SECONDS
    - DURATION=$((END_TIME-START_TIME))
    - ERRORS=$(grep -c 'error' logs/output.log) # Count warnings in output.log
    - echo "📊 **Execution Summary** 📊"
    - |
      echo -e "📊 **Execution Summary** 📊\n\
      🚀 Start Time: $(date -d @$START_TIME +"%Y-%m-%d %H:%M:%S")\n\
      🏁 End Time: $(date -d @$END_TIME +"%Y-%m-%d %H:%M:%S")\n\
      ⏱ Duration: $DURATION seconds\n\
      ❌ Number of Errors (Warnings): $ERRORS" | tee logs/summary.log
  artifacts:
    paths:
      - logs/
    expire_in: 4 weeks
  cache:
    paths:
      - .pip_cache/
    key: "${CI_COMMIT_REF_SLUG}"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

update_cumulative_summary:
  image: python:3.8-alpine
  stage: finalize
  script:
    - apk add --no-cache git
    - git config --global user.email "your_email@example.com"
    - git config --global user.name "Your Name"
    - git clone $CI_REPOSITORY_URL temp_repo
    - cd temp_repo
    - git checkout $CI_DEFAULT_BRANCH
    - mkdir -p logs
    - cp ../logs/summary.log logs/${CI_COMMIT_SHORT_SHA}_summary.log
    - echo -e "\n## Pipeline Run: $CI_PIPELINE_ID - Commit: $CI_COMMIT_SHORT_SHA" >> all_summaries.md
    - cat logs/${CI_COMMIT_SHORT_SHA}_summary.log >> all_summaries.md
    - git add all_summaries.md
    - git commit -m "Update cumulative summary for pipeline $CI_PIPELINE_ID"
    - git push origin $CI_DEFAULT_BRANCH
  only:
    - schedules
    - web

build_and_push:
  image: docker:latest
  stage: deploy
  services:
    - docker:dind
  only:
    - tags
  script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    - docker build -t "$DOCKERHUB_USERNAME/toolshed_metadata_importer:$CI_COMMIT_TAG" -f Dockerfile .
    - docker push "$DOCKERHUB_USERNAME/toolshed_metadata_importer:$CI_COMMIT_TAG"
  after_script:
    - docker logout
